<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Öz-Tekne · Gin & Tekila Defteri</title>
<meta name="theme-color" content="#06212E" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Öz-Tekne" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --abyss:#06212E;        /* deep Aegean night-sea */
    --sea:#0E3D4C;          /* surface teal */
    --sea-2:#11515F;
    --turq:#33DBD0;         /* evolved brand cyan */
    --turq-dim:#1f8f8c;
    --foam:#EAF6F4;         /* light text */
    --foam-dim:#9CC4C2;
    --sun:#F5C451;          /* champion brass */
    --coral:#FF7A6B;        /* tekila accent */
    --line:rgba(51,219,208,.16);
    --card:#0B3140;
    --card-2:#0d3a4b;
    --shadow:0 14px 40px -18px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 520px at 50% -8%, #0d3d4c 0%, transparent 60%),
      linear-gradient(180deg,#06212E 0%, #04161f 100%);
    background-attachment:fixed;
    color:var(--foam);
    font-family:"Space Grotesk",system-ui,sans-serif;
    min-height:100vh;
    padding:0 0 calc(124px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 16px}

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:18px 0 10px;
  }
  .brand{display:flex;flex-direction:column;line-height:1}
  .brand .name{
    font-family:"Anton",sans-serif;letter-spacing:.04em;font-size:30px;
    color:var(--foam);text-transform:uppercase;
  }
  .brand .name b{color:var(--turq)}
  .brand .sub{
    font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--foam-dim);margin-top:6px;font-weight:500;
  }
  .top-actions{display:flex;align-items:center;gap:8px}
  .live{
    display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--foam-dim);
  }
  .dot{width:8px;height:8px;border-radius:50%;background:#6b6b6b}
  .dot.on{background:var(--turq);box-shadow:0 0 0 0 rgba(51,219,208,.6);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(51,219,208,.55)}70%{box-shadow:0 0 0 9px rgba(51,219,208,0)}100%{box-shadow:0 0 0 0 rgba(51,219,208,0)}}
  .ghost{
    background:rgba(51,219,208,.08);border:1px solid var(--line);color:var(--foam);
    font-family:"Space Grotesk";font-size:13px;font-weight:500;
    padding:9px 13px;border-radius:11px;cursor:pointer;letter-spacing:.02em;
    display:inline-flex;align-items:center;gap:7px;transition:background .18s,border-color .18s;
  }
  .ghost:hover{background:rgba(51,219,208,.16);border-color:var(--turq-dim)}
  .ghost:active{transform:translateY(1px)}

  /* ---------- champion ---------- */
  .captain{
    position:relative;overflow:hidden;border-radius:20px;
    background:linear-gradient(160deg,#0c3a4a,#0a2f3d);
    border:1px solid var(--line);box-shadow:var(--shadow);
    padding:18px 20px 20px;margin-top:8px;
  }
  .captain .waterline{
    position:absolute;left:0;right:0;bottom:0;height:0;
    background:linear-gradient(180deg,rgba(51,219,208,.20),rgba(51,219,208,.05));
    border-top:2px solid rgba(51,219,208,.45);
    transition:height .8s cubic-bezier(.22,1,.36,1);pointer-events:none;
  }
  .captain .label{
    font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--sun);
    font-weight:700;position:relative;
  }
  .captain .who{
    display:flex;align-items:baseline;gap:10px;margin-top:8px;position:relative;flex-wrap:wrap;
  }
  .captain .who .nm{font-family:"Anton";font-size:32px;letter-spacing:.02em;text-transform:uppercase}
  .captain .who .em{font-size:26px}
  .captain .who .sc{
    margin-left:auto;font-family:"Space Mono";font-weight:700;font-size:34px;color:var(--sun);
    line-height:1;
  }
  .captain .who .sc small{font-size:12px;color:var(--foam-dim);font-weight:400;letter-spacing:.1em}
  .captain .empty{color:var(--foam-dim);font-size:14px;margin-top:6px}

  /* ---------- week strip ---------- */
  .weekrow{
    display:flex;align-items:center;justify-content:space-between;
    margin:20px 2px 12px;
  }
  .weekrow .wk{font-size:13px;color:var(--foam-dim);letter-spacing:.04em}
  .weekrow .wk b{color:var(--foam);font-weight:700}
  .weekrow .tot{
    font-family:"Space Mono";font-size:13px;color:var(--foam-dim);
    display:flex;align-items:center;gap:8px;
  }
  .weekrow .tot b{color:var(--turq);font-size:16px;font-weight:700}

  /* ---------- leaderboard (Variant A: tek satır, çift stepper) ---------- */
  #board{display:flex;flex-direction:column;gap:8px;position:relative}
  .card{
    display:flex;align-items:center;gap:8px;
    background:linear-gradient(180deg,var(--card),var(--card-2));
    border:1px solid var(--line);border-radius:12px;padding:7px 10px;height:54px;
    will-change:transform;
  }
  .card.lead{border-color:rgba(245,196,81,.5);box-shadow:0 0 0 1px rgba(245,196,81,.18) inset}
  .rank{
    font-family:"Space Mono";font-size:12px;color:var(--foam-dim);width:16px;flex:0 0 16px;
    text-align:center;font-weight:700;
  }
  .card.lead .rank{color:var(--sun)}
  .cem{font-size:18px;flex:0 0 auto}
  .nm{flex:1;min-width:0;font-weight:700;font-size:15px;letter-spacing:.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .grp{display:flex;align-items:center;gap:3px;flex:0 0 auto}
  .grp .lbl{font-size:14px;margin-right:1px}
  .grp .v{font-family:"Space Mono";font-weight:700;font-size:16px;width:20px;text-align:center;
    display:inline-block;transform-origin:center}
  .grp.kokteyl .v{color:var(--turq)}
  .grp.tekila  .v{color:var(--coral)}
  .grp .v.bump{animation:bump .32s ease}
  @keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(1)}}

  .step{
    width:30px;height:30px;border-radius:9px;border:1px solid var(--line);
    background:rgba(51,219,208,.08);color:var(--foam);font-size:19px;font-weight:700;
    cursor:pointer;display:grid;place-items:center;line-height:1;user-select:none;
    transition:transform .07s,background .15s;
  }
  .step:hover{background:rgba(51,219,208,.16)}
  .step:active{transform:scale(.88)}
  .grp.kokteyl .step.plus{background:rgba(51,219,208,.18);border-color:var(--turq-dim)}
  .grp.tekila  .step.plus{background:rgba(255,122,107,.16);border-color:rgba(255,122,107,.45)}
  .step.minus{font-size:21px}

  /* ---------- empty / setup ---------- */
  .panel{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:24px;text-align:center;margin-top:14px;
  }
  .panel h3{font-family:"Anton";font-size:22px;letter-spacing:.02em;margin-bottom:10px;text-transform:uppercase}
  .panel p{color:var(--foam-dim);font-size:14px;line-height:1.6;margin-bottom:16px}
  .panel.setup{text-align:left}
  .panel.setup code{
    display:block;background:#04161f;border:1px solid var(--line);border-radius:10px;
    padding:12px;font-family:"Space Mono";font-size:12px;color:var(--turq);
    white-space:pre-wrap;word-break:break-word;margin:10px 0;
  }
  .panel.setup ol{margin:12px 0 0 18px;color:var(--foam-dim);font-size:14px;line-height:1.8}
  .panel.setup b{color:var(--foam)}

  .btn-primary{
    background:var(--turq);color:#04161f;border:none;font-family:"Space Grotesk";
    font-weight:700;font-size:15px;padding:13px 20px;border-radius:13px;cursor:pointer;
    letter-spacing:.01em;transition:filter .15s,transform .08s;
  }
  .btn-primary:hover{filter:brightness(1.07)}
  .btn-primary:active{transform:translateY(1px)}

  /* ---------- footer ---------- */
  .footbar{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:linear-gradient(180deg,rgba(4,22,31,.4),rgba(4,22,31,.96));
    backdrop-filter:blur(10px);border-top:1px solid var(--line);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  }
  .footbar .inner{max-width:640px;margin:0 auto;display:flex;gap:10px}
  .footbar .ghost{flex:1;justify-content:center}
  .footbar .danger{color:var(--coral)}

  /* ---------- modal ---------- */
  .scrim{
    position:fixed;inset:0;z-index:40;background:rgba(2,12,17,.7);backdrop-filter:blur(4px);
    display:none;align-items:flex-end;justify-content:center;
  }
  .scrim.open{display:flex}
  .sheet{
    width:100%;max-width:640px;max-height:88vh;overflow:auto;
    background:linear-gradient(180deg,#0b3140,#082633);
    border:1px solid var(--line);border-bottom:none;border-radius:22px 22px 0 0;
    padding:18px 18px calc(28px + env(safe-area-inset-bottom));
    animation:rise .28s cubic-bezier(.22,1,.36,1);
  }
  @keyframes rise{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
  .sheet .sh-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .sheet .sh-head h2{font-family:"Anton";font-size:22px;letter-spacing:.02em;text-transform:uppercase}
  .x{background:none;border:none;color:var(--foam-dim);font-size:26px;cursor:pointer;line-height:1;padding:4px}

  .crew-edit{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
  .crew-edit .emoji-in{width:48px;text-align:center;font-size:20px}
  .crew-edit input{
    background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--foam);
    border-radius:10px;padding:10px;font-family:"Space Grotesk";font-size:15px;
  }
  .crew-edit .name-in{flex:1;min-width:0}
  .crew-edit .del{background:none;border:none;color:var(--coral);font-size:20px;cursor:pointer;padding:4px 8px}
  .add-row{display:flex;gap:8px;margin-top:14px}
  .add-row .emoji-in{width:54px}
  .hint{color:var(--foam-dim);font-size:12px;margin-top:14px;line-height:1.6}

  /* archive */
  .arc-week{border:1px solid var(--line);border-radius:13px;margin-bottom:10px;overflow:hidden}
  .arc-week .ah{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:13px 14px;cursor:pointer;background:rgba(255,255,255,.02);
  }
  .arc-week .ah .al{font-weight:700;font-size:15px}
  .arc-week .ah .ar{font-family:"Space Mono";font-size:13px;color:var(--foam-dim);display:flex;align-items:center;gap:10px}
  .arc-week .ah .champ{color:var(--sun)}
  .arc-week .ab{display:none;padding:4px 14px 12px}
  .arc-week.open .ab{display:block}
  .arc-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line);font-size:14px}
  .arc-row:first-child{border-top:none}
  .arc-row .ar-rk{font-family:"Space Mono";color:var(--foam-dim);width:20px}
  .arc-row .ar-nm{flex:1;display:flex;gap:7px;align-items:center;min-width:0}
  .arc-row .ar-nm .txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .arc-row .ar-d{font-family:"Space Mono";font-size:12px;color:var(--foam-dim)}
  .arc-row .ar-d .k{color:var(--turq)} .arc-row .ar-d .t{color:var(--coral)}
  .arc-row .ar-tot{font-family:"Space Mono";font-weight:700;width:30px;text-align:right}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="name">ÖZ<b>·</b>TEKNE</div>
      <div class="sub">Gin &amp; Tekila Defteri</div>
    </div>
    <div class="top-actions">
      <span class="live"><span class="dot" id="liveDot"></span><span id="liveTxt">bağlanıyor</span></span>
      <button class="ghost" id="openArchive">⚓ Arşiv</button>
    </div>
  </div>

  <div id="app"><!-- rendered here --></div>
</div>

<div class="footbar" id="footbar" style="display:none">
  <div class="inner">
    <button class="ghost" id="openCrew">👥 Kadro</button>
    <button class="ghost danger" id="newWeek">🌊 Yeni hafta</button>
  </div>
</div>

<!-- Kadro modal -->
<div class="scrim" id="crewScrim">
  <div class="sheet">
    <div class="sh-head"><h2>Kadro</h2><button class="x" data-close>×</button></div>
    <div id="crewList"></div>
    <div class="add-row">
      <input class="emoji-in" id="newEmoji" maxlength="4" placeholder="🌊" />
      <input class="name-in" id="newName" placeholder="Yeni isim ekle" />
      <button class="btn-primary" id="addCrew">Ekle</button>
    </div>
    <div class="hint" id="seedHint" style="display:none">
      İlk kez mi açıyorsun? <a href="#" id="seedLink" style="color:var(--turq)">Geçen haftanın kadrosunu yükle</a>.
    </div>
    <div class="hint">İsmin ortasına dokunup değiştirebilirsin; değişiklikler herkese anında yansır.</div>
  </div>
</div>

<!-- Arşiv modal -->
<div class="scrim" id="archiveScrim">
  <div class="sheet">
    <div class="sh-head"><h2>⚓ Arşiv</h2><button class="x" data-close>×</button></div>
    <div id="archiveList"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update, push, remove, set, get, increment, runTransaction }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ====================================================================
   1) FIREBASE AYARLARI — buraya kendi projenin config'ini yapıştır.
   (Firebase konsolu > Proje ayarları > "Web uygulaması" > config)
   ==================================================================== */
const firebaseConfig = {
  apiKey:            "AIzaSyDpmYQ4E0_7oZWIM_6CSyFfoCVYMB-n_2s",
  authDomain:        "tekne-mix.firebaseapp.com",
  databaseURL:       "https://tekne-mix-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "tekne-mix",
  storageBucket:     "tekne-mix.firebasestorage.app",
  messagingSenderId: "77070341538",
  appId:             "1:77070341538:web:fba6a81194b3762aba4efb",
  measurementId:     "G-53NHMWQ4FZ"
};
/* ==================================================================== */

const DRINKS = {
  kokteyl: { label:"Kokteyl", emoji:"🍸" },
  tekila:  { label:"Tekila",  emoji:"🌵" }
};
const SEED = [
  {emoji:"🏄", name:"ÖZGEOKYANUS"}, {emoji:"🛸", name:"İLKAYABİİİ"},
  {emoji:"🐚", name:"GİZEMSU"},     {emoji:"⛵", name:"BATUBEY"},
  {emoji:"💰", name:"ASLISU"},      {emoji:"🛶", name:"SERKANN"},
  {emoji:"💧", name:"DAMLASU"},     {emoji:"🌊", name:"UTKUSU"},
  {emoji:"🐬", name:"TUĞÇESU"},     {emoji:"⚓", name:"OZANSU"},
  {emoji:"🧪", name:"ALİH2O"}
];

const $ = s => document.querySelector(s);
const isConfigured = !String(firebaseConfig.apiKey).includes("PASTE");

let db = null, state = { weekId:null, startedAt:null, crew:{} };
let archive = {};
const nodes = new Map();       // crew id -> card element
let prevVals = {};             // for bump animation (per drink)

/* ---------- SETUP screen if not configured ---------- */
if(!isConfigured){
  $("#liveTxt").textContent = "kurulum gerekli";
  $("#openArchive").style.display = "none";
  $("#app").innerHTML = `
    <div class="panel setup">
      <h3>Önce Firebase'i bağlayalım</h3>
      <p>Canlı senkron için ücretsiz bir Firebase Realtime Database gerekiyor. 5 dakikalık iş:</p>
      <ol>
        <li><b>console.firebase.google.com</b> → yeni proje oluştur (ücretsiz "Spark" planı yeterli).</li>
        <li>Sol menü → <b>Build → Realtime Database → Create Database</b> → bölge <b>europe-west1</b> → "Start in test mode".</li>
        <li>Proje ayarları (⚙️) → <b>Your apps</b> → Web (&lt;/&gt;) ekle → çıkan <b>firebaseConfig</b> bloğunu kopyala.</li>
        <li>Bu dosyadaki <b>firebaseConfig</b> bloğunun yerine yapıştır, kaydet, GitHub'a pushla.</li>
      </ol>
      <p style="margin-top:16px">Veritabanı kuralları (Realtime Database → Rules) — bu küçük grup için açık erişim yeterli:</p>
      <code>{
  "rules": {
    "state":   { ".read": true, ".write": true },
    "archive": { ".read": true, ".write": true }
  }
}</code>
      <p>Bağladıktan sonra bu ekran kaybolur ve defter açılır.</p>
    </div>`;
} else {
  start();
}

function start(){
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);
  $("#footbar").style.display = "block";

  onValue(ref(db,"state"), snap => {
    const v = snap.val() || {};
    if(!v.weekId){ initWeek(); return; }   // first ever run
    state = { weekId:v.weekId, startedAt:v.startedAt, crew:v.crew || {} };
    setLive(true);
    render();
    refreshCrewModal();
  }, () => setLive(false));

  onValue(ref(db,"archive"), snap => { archive = snap.val() || {}; refreshArchive(); });
}

function setLive(on){
  $("#liveDot").classList.toggle("on", on);
  $("#liveTxt").textContent = on ? "canlı" : "çevrimdışı";
}

function newWeekId(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+
         String(d.getDate()).padStart(2,"0")+"-"+String(d.getHours()).padStart(2,"0")+
         String(d.getMinutes()).padStart(2,"0");
}
function fmtWeek(id){
  if(!id) return "";
  const [y,m,d] = id.split("-");
  const months=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  return `${parseInt(d,10)} ${months[parseInt(m,10)-1]} ${y}`;
}
function initWeek(){
  set(ref(db,"state"), { weekId:newWeekId(), startedAt:Date.now(), crew:{} });
}

/* ---------- crew helpers ---------- */
function total(p){ return (p.kokteyl||0) + (p.tekila||0); }
function orderedCrew(){   // fixed display order = insertion order
  return Object.entries(state.crew||{})
    .map(([id,p]) => ({id, ...p}))
    .sort((a,b) => (a.order||0)-(b.order||0) || a.name.localeCompare(b.name,"tr"));
}
function champion(list){  // leader by total, for the captain strip only
  return [...list].sort((a,b)=> total(b)-total(a) || (a.order||0)-(b.order||0));
}

/* ---------- render leaderboard with FLIP reordering ---------- */
function render(){
  const list = orderedCrew();
  const grandTotal = list.reduce((s,p)=>s+total(p),0);
  const ranked = champion(list);
  const top = ranked[0];

  // champion strip + week strip + board container (build once)
  if(!$("#board")){
    $("#app").innerHTML = `
      <div class="captain" id="captain"></div>
      <div class="weekrow">
        <div class="wk">Hafta: <b id="wkLabel"></b></div>
        <div class="tot">Toplam bardak <b id="grandTotal">0</b></div>
      </div>
      <div id="board"></div>`;
  }
  $("#wkLabel").textContent = fmtWeek(state.weekId);
  $("#grandTotal").textContent = grandTotal;

  // champion
  const cap = $("#captain");
  const topTotal = top ? total(top) : 0;
  const leadIds = new Set(topTotal>0 ? ranked.filter(p=>total(p)===topTotal).map(p=>p.id) : []);
  if(!top){
    cap.innerHTML = `<div class="label">Bu haftanın kaptanı</div>
      <div class="empty">Kadro boş. Aşağıdan ekip ekleyip saymaya başlayın 🍸</div>`;
  } else if(topTotal===0){
    cap.innerHTML = `<div class="waterline" style="height:0"></div>
      <div class="label">Bu haftanın kaptanı</div>
      <div class="empty">Henüz kimse içmedi. İlk bardağı kim açacak? 🌵</div>`;
  } else {
    const tie = ranked.filter(p=>total(p)===topTotal);
    const nameHtml = tie.length>1
      ? tie.slice(0,2).map(p=>`${p.emoji||""} ${p.name}`).join("  &amp;  ")
      : `<span class="em">${top.emoji||""}</span><span class="nm">${esc(top.name)}</span>`;
    const fill = Math.min(100, 28 + topTotal/Math.max(1,grandTotal)*72);
    cap.innerHTML = `
      <div class="waterline" style="height:${fill}%"></div>
      <div class="label">Bu haftanın kaptanı${tie.length>1?" · başa baş":""}</div>
      <div class="who">${tie.length>1?`<span class="nm" style="font-size:24px">${nameHtml}</span>`:nameHtml}
        <span class="sc">${topTotal} <small>bardak</small></span>
      </div>`;
  }

  // FLIP: measure old positions (rows only move on add/remove, not on score change)
  const board = $("#board");
  const firstRects = new Map();
  nodes.forEach((el,id)=>firstRects.set(id, el.getBoundingClientRect()));

  // sync nodes: create/update
  const seen = new Set();
  list.forEach((p,i)=>{
    seen.add(p.id);
    let el = nodes.get(p.id);
    if(!el){ el = makeCard(p.id); nodes.set(p.id, el); }
    updateCard(el, p, i, leadIds.has(p.id));
  });
  // remove stale
  nodes.forEach((el,id)=>{ if(!seen.has(id)){ el.remove(); nodes.delete(id); } });

  // reorder DOM
  list.forEach(p => board.appendChild(nodes.get(p.id)));

  // FLIP: animate from old to new
  if(!matchMedia("(prefers-reduced-motion: reduce)").matches){
    nodes.forEach((el,id)=>{
      const first = firstRects.get(id); if(!first) return;
      const last = el.getBoundingClientRect();
      const dy = first.top - last.top;
      if(Math.abs(dy) < 1) return;
      el.style.transition = "none";
      el.style.transform = `translateY(${dy}px)`;
      requestAnimationFrame(()=>{
        el.style.transition = "transform .42s cubic-bezier(.22,1,.36,1)";
        el.style.transform = "";
      });
    });
  }
  prevVals = Object.fromEntries(list.map(p=>[p.id, {kokteyl:p.kokteyl||0, tekila:p.tekila||0}]));
}

function makeCard(id){
  const el = document.createElement("div");
  el.className = "card";
  el.dataset.id = id;
  el.innerHTML = `
    <span class="rank"></span>
    <span class="cem"></span>
    <span class="nm"></span>
    ${drinkHtml("kokteyl")}
    ${drinkHtml("tekila")}`;
  el.querySelectorAll(".step").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const dr = btn.dataset.drink, delta = btn.dataset.delta;
      if(delta==="1") update(ref(db,`state/crew/${id}`), { [dr]: increment(1) });
      else runTransaction(ref(db,`state/crew/${id}/${dr}`), v => Math.max(0,(v||0)-1));
    });
  });
  return el;
}
function drinkHtml(k){
  const d = DRINKS[k];
  return `<span class="grp ${k}">
    <span class="lbl">${d.emoji}</span>
    <button class="step minus" data-drink="${k}" data-delta="-1" aria-label="${d.label} azalt">–</button>
    <span class="v" data-v="${k}">0</span>
    <button class="step plus" data-drink="${k}" data-delta="1" aria-label="${d.label} artır">+</button>
  </span>`;
}
function updateCard(el, p, index, isLead){
  el.classList.toggle("lead", !!isLead);
  el.querySelector(".rank").textContent = index+1;
  el.querySelector(".cem").textContent = p.emoji||"";
  el.querySelector(".nm").textContent = p.name;
  const prev = prevVals[p.id];
  ["kokteyl","tekila"].forEach(k=>{
    const v = el.querySelector(`[data-v="${k}"]`);
    const val = p[k]||0;
    if(prev && prev[k]!==val){ v.classList.remove("bump"); void v.offsetWidth; v.classList.add("bump"); }
    v.textContent = val;
  });
}
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ---------- new week ---------- */
$("#newWeek").addEventListener("click", async ()=>{
  if(!Object.keys(state.crew||{}).length){ alert("Önce kadro ekleyin."); return; }
  if(!confirm("Yeni hafta başlatılsın mı?\nBu hafta arşive kaydedilecek, sayaçlar sıfırlanacak. Kadro kalır.")) return;
  // snapshot to archive
  const snap = {
    endedAt: Date.now(),
    startedAt: state.startedAt,
    crew: state.crew
  };
  await set(ref(db,`archive/${state.weekId}`), snap);
  // reset counts, keep crew + names + order
  const resetCrew = {};
  Object.entries(state.crew).forEach(([id,p])=>{
    resetCrew[id] = { name:p.name, emoji:p.emoji||"", kokteyl:0, tekila:0, order:p.order||0 };
  });
  await set(ref(db,"state"), { weekId:newWeekId(), startedAt:Date.now(), crew:resetCrew });
});

/* ---------- crew modal ---------- */
const crewScrim = $("#crewScrim");
$("#openCrew").addEventListener("click", ()=>{ refreshCrewModal(); crewScrim.classList.add("open"); });
function refreshCrewModal(){
  if(!crewScrim.classList.contains("open") && nodes.size) {/* still keep list fresh */}
  const listEl = $("#crewList");
  const entries = Object.entries(state.crew||{})
    .map(([id,p])=>({id,...p}))
    .sort((a,b)=>(a.order||0)-(b.order||0) || a.name.localeCompare(b.name,"tr"));
  listEl.innerHTML = "";
  entries.forEach(p=>{
    const row = document.createElement("div");
    row.className = "crew-edit";
    row.innerHTML = `
      <input class="emoji-in" maxlength="4" value="${esc(p.emoji||"")}" />
      <input class="name-in" value="${esc(p.name)}" />
      <button class="del" title="Çıkar">🗑</button>`;
    const [emojiIn, nameIn] = row.querySelectorAll("input");
    emojiIn.addEventListener("change", ()=>update(ref(db,`state/crew/${p.id}`),{emoji:emojiIn.value}));
    nameIn.addEventListener("change", ()=>{ if(nameIn.value.trim()) update(ref(db,`state/crew/${p.id}`),{name:nameIn.value.trim()}); });
    row.querySelector(".del").addEventListener("click", ()=>{
      if(confirm(`${p.name} kadrodan çıkarılsın mı?`)) remove(ref(db,`state/crew/${p.id}`));
    });
    listEl.appendChild(row);
  });
  $("#seedHint").style.display = entries.length ? "none" : "block";
}
$("#addCrew").addEventListener("click", addCrewFromInputs);
$("#newName").addEventListener("keydown", e=>{ if(e.key==="Enter") addCrewFromInputs(); });
function addCrewFromInputs(){
  const name = $("#newName").value.trim();
  if(!name) return;
  const order = Object.keys(state.crew||{}).length;
  push(ref(db,"state/crew"), { name, emoji:$("#newEmoji").value.trim()||"🌊", kokteyl:0, tekila:0, order });
  $("#newName").value=""; $("#newEmoji").value="";
  $("#newName").focus();
}
$("#seedLink").addEventListener("click", e=>{
  e.preventDefault();
  SEED.forEach((p,i)=>push(ref(db,"state/crew"), {name:p.name, emoji:p.emoji, kokteyl:0, tekila:0, order:i}));
});

/* ---------- archive modal ---------- */
const archiveScrim = $("#archiveScrim");
$("#openArchive").addEventListener("click", ()=>{ refreshArchive(); archiveScrim.classList.add("open"); });
function refreshArchive(){
  const listEl = $("#archiveList");
  if(!listEl) return;
  const weeks = Object.entries(archive)
    .map(([id,w])=>({id,...w}))
    .sort((a,b)=>(b.endedAt||0)-(a.endedAt||0));
  if(!weeks.length){
    listEl.innerHTML = `<div class="panel"><p>Henüz arşivlenmiş hafta yok. "Yeni hafta" dediğinde mevcut hafta buraya düşer.</p></div>`;
    return;
  }
  listEl.innerHTML = "";
  weeks.forEach(w=>{
    const crew = Object.values(w.crew||{}).map(p=>({...p, t:(p.kokteyl||0)+(p.tekila||0)}))
      .sort((a,b)=>b.t-a.t || a.name.localeCompare(b.name,"tr"));
    const grand = crew.reduce((s,p)=>s+p.t,0);
    const champ = crew[0] && crew[0].t>0 ? `${crew[0].emoji||""} ${crew[0].name}` : "—";
    const box = document.createElement("div");
    box.className = "arc-week";
    box.innerHTML = `
      <div class="ah">
        <span class="al">${fmtWeek(w.id)}</span>
        <span class="ar"><span class="champ">🏆 ${esc(champ)}</span><span>${grand} bardak</span></span>
      </div>
      <div class="ab">
        ${crew.map((p,i)=>`
          <div class="arc-row">
            <span class="ar-rk">${i+1}</span>
            <span class="ar-nm">${p.emoji||""} <span class="txt">${esc(p.name)}</span></span>
            <span class="ar-d"><span class="k">🍸${p.kokteyl||0}</span> · <span class="t">🌵${p.tekila||0}</span></span>
            <span class="ar-tot">${p.t}</span>
          </div>`).join("")}
      </div>`;
    box.querySelector(".ah").addEventListener("click", ()=>box.classList.toggle("open"));
    listEl.appendChild(box);
  });
}

/* ---------- modal close ---------- */
document.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click", closeAll));
document.querySelectorAll(".scrim").forEach(s=>s.addEventListener("click", e=>{ if(e.target===s) closeAll(); }));
function closeAll(){ document.querySelectorAll(".scrim").forEach(s=>s.classList.remove("open")); }
</script>
